                      type: object
                      properties:
                        market_id:
                          type: string
                        yes_shares:
                          type: number
                        no_shares:
                          type: number
                        avg_entry_yes:
                          type: number
                        avg_entry_no:
                          type: number
                        open_orders_value:
                          type: number
                        quote_currency:
                          type: string
