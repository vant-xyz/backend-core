  /admin/markets/{id}/stats:
    get:
      tags: [Admin]
      summary: Get market stats (volume, open interest, traders)
      security:
        - adminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Market statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  market:
                    $ref: '#/components/schemas/Market'
                  stats:
                    type: object
                    properties:
                      open_order_count:
                        type: integer
