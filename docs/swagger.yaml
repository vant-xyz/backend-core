            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, PARTIALLY_FILLED, FILLED, CANCELLED]
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  count:
